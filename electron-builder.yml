appId: com.ecultify.tasktracker
productName: The Ecultify
copyright: Copyright © 2026 Ecultify

directories:
  output: dist-release
  buildResources: assets

files:
  - dist-electron/**/*
  - assets/**/*
  - package.json
  - "!node_modules"

extraMetadata:
  main: dist-electron/main.js

mac:
  category: public.app-category.productivity
  identity: null
  target:
    - target: dmg
      arch:
        - arm64
  icon: assets/icon.png

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.png

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false

publish:
  provider: github
  releaseType: release

# To enable code signing later:
#
# macOS:
#   1. Enroll in Apple Developer Program ($99/year)
#   2. Set env vars: CSC_LINK (path to .p12), CSC_KEY_PASSWORD
#   3. Add to mac section:
#      hardenedRuntime: true
#      entitlements: assets/entitlements.mac.plist
#      entitlementsInherit: assets/entitlements.mac.plist
#   4. Add afterSign notarize script
#
# Windows:
#   1. Purchase OV/EV code signing cert
#   2. Set env vars: CSC_LINK (path to .pfx), CSC_KEY_PASSWORD
#   electron-builder picks them up automatically
